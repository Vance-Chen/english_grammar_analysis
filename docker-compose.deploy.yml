# 镜像拷贝 / Hub 拉取部署（目标机无需源码）
# 启动：docker compose -f docker-compose.deploy.yml --env-file .env up -d

services:
  api:
    image: ${API_IMAGE:-grammar-station-api:latest}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    expose:
      - "8788"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/api/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ${WEB_IMAGE:-grammar-station-web:latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
