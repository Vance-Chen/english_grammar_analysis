services:
  api:
    image: grammar-station-api:${IMAGE_TAG:-latest}
    build:
      context: ./api-py
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    expose:
      - "8788"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/api/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: grammar-station-web:${IMAGE_TAG:-latest}
    build:
      context: ./web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
